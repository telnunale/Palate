spring.application.name=palate-backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

palate.gemini.api-key=${PALATE_GEMINI_API_KEY:}
palate.pexels.api-key=${PALATE_PEXELS_API_KEY:}
palate.fal.api-key=${PALATE_FAL_API_KEY:}

palate.cloudinary.cloud-name=${PALATE_CLOUDINARY_CLOUD_NAME:}
palate.cloudinary.api-key=${PALATE_CLOUDINARY_API_KEY:}
palate.cloudinary.api-secret=${PALATE_CLOUDINARY_API_SECRET:}
palate.cloudinary.folder=${PALATE_CLOUDINARY_FOLDER:palate/recetas}

palate.edamam.app-id=${PALATE_EDAMAM_APP_ID:}
palate.edamam.app-key=${PALATE_EDAMAM_APP_KEY:}
